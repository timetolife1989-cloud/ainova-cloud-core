<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — Ainova Cloud Intelligence</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020810;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 28rem; }
    .icon {
      width: 4rem; height: 4rem; margin: 0 auto 1.5rem;
      opacity: 0.5;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; color: #f1f5f9; }
    p { color: #94a3b8; line-height: 1.6; margin-bottom: 1rem; }
    .btn {
      display: inline-block;
      margin-top: 1rem;
      padding: 0.625rem 1.5rem;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 0.5rem;
      font-size: 0.875rem;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover { background: #2563eb; }
  </style>
</head>
<body>
  <div class="container">
    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0119 12.55M5 12.55a10.94 10.94 0 015.17-2.39M10.71 5.05A16 16 0 0122.56 9M1.42 9a15.91 15.91 0 014.7-2.88M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h1>No Internet Connection</h1>
    <p>You are currently offline. Please check your network connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry</button>
  </div>
</body>
</html>
